<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | AARAVAM 2025–26</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="tailwind-config.js"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-container {
      background: rgba(31,22,13,0.9);
      border: 1px solid rgba(201,162,39,0.2);
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    input {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(201,162,39,0.3);
      color: #F5EFE0;
      padding: 12px 16px;
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      margin-top: 24px;
      margin-bottom: 24px;
      text-align: center;
      letter-spacing: 0.1em;
    }
    input:focus {
      outline: none;
      border-color: #C9A227;
      box-shadow: 0 0 10px rgba(201,162,39,0.2);
    }
    .btn {
      width: 100%;
      background: linear-gradient(135deg, rgba(201,162,39,0.9), rgba(168,114,18,0.9));
      color: #0A0704;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 12px 20px;
      border-radius: 4px;
      cursor: pointer;
      text-transform: uppercase;
      border: none;
      transition: all 0.2s;
    }
    .btn:hover {
      background: linear-gradient(135deg, rgba(220,180,60,1), rgba(180,130,25,1));
      transform: translateY(-1px);
    }
    #error-msg {
      color: #F2601E;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      margin-top: -12px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body class="bg-bg-base text-text-primary font-body" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;">

  <div class="login-container">
    <h1 style="font-family: 'Cinzel', serif; font-size: 28px; color: #C9A227; letter-spacing: 0.2em; margin-bottom: 8px;">AARAVAM</h1>
    <h2 style="font-family: 'Inter', sans-serif; font-size: 14px; color: #B8A98A; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;">Admin Authentication</h2>
    
    <form id="login-form">
      <input type="password" id="password" required placeholder="Enter Password">
      <div id="error-msg">Incorrect password. Please try again.</div>
      <button type="submit" class="btn">Authenticate</button>
    </form>
    
    <div style="margin-top: 24px;">
      <a href="index.html" style="font-family: 'Inter', sans-serif; font-size: 12px; color: #7A6E58; text-decoration: none; transition: color 0.2s;">&larr; Return to Homepage</a>
    </div>
  </div>

  <script>
    // Redirect to admin if already authenticated
    if (sessionStorage.getItem('adminToken') === 'aaravam@admin2526') {
      window.location.href = 'admin.html';
    }

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const pass = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      
      // We check against the actual password here for simplicity,
      // but the real security comes from the backend API validating this exact token!
      if (pass === 'aaravam@admin2526') {
        sessionStorage.setItem('adminToken', pass);
        window.location.href = 'admin.html';
      } else {
        errorMsg.style.display = 'block';
        document.getElementById('password').value = '';
      }
    });
  </script>
</body>
</html>
